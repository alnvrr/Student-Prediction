<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student AI System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    width: 100%;
    max-width: 400px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
}

/* Logo */
.logo {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* Tabs */
.nav-tabs {
    border: none;
    justify-content: center;
    margin-bottom: 15px;
}

.nav-tabs .nav-link {
    color: rgba(255,255,255,0.7);
    border: none;
    font-weight: 500;
    transition: 0.3s;
}

.nav-tabs .nav-link.active {
    background: rgba(255,255,255,0.9);
    color: #4f46e5;
    border-radius: 10px;
}

/* Inputs */
.form-control {
    border-radius: 10px;
    padding: 10px;
    border: none;
    background: rgba(255,255,255,0.9);
}

.form-control:focus {
    box-shadow: 0 0 0 2px #c7d2fe;
}

/* Buttons */
.btn {
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-primary {
    background: #4f46e5;
    border: none;
}

.btn-primary:hover {
    background: #4338ca;
}

.btn-success {
    background: #22c55e;
    border: none;
}

.btn-success:hover {
    background: #16a34a;
}

/* Eye button */
.input-group .btn {
    background: rgba(255,255,255,0.9);
    border: none;
}

/* Alert */
.alert {
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">🎓 Student AI System</div>
<div class="subtitle">Access your student dashboard</div>

<!-- FLASH MESSAGE -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-warning text-dark">
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}

<!-- TABS -->
<ul class="nav nav-tabs">
  <li class="nav-item">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">Register</button>
  </li>
</ul>

<div class="tab-content">

<!-- LOGIN -->
<div class="tab-pane fade show active" id="login">
<form method="POST">

<input name="username" class="form-control mb-3" placeholder="Enter your username" required>

<div class="input-group mb-3">
<input id="loginPass" name="password" type="password" class="form-control" placeholder="Enter your password" required>
<button type="button" class="btn" onclick="togglePass('loginPass')">👁</button>
</div>

<button class="btn btn-primary w-100">Login</button>

</form>
</div>

<!-- REGISTER -->
<div class="tab-pane fade" id="register">
<form action="/register" method="POST">

<input name="username" class="form-control mb-3" placeholder="Choose a username" required>

<div class="input-group mb-3">
<input id="regPass" name="password" type="password" class="form-control" placeholder="Create a password" required>
<button type="button" class="btn" onclick="togglePass('regPass')">👁</button>
</div>

<button class="btn btn-success w-100">Create Account</button>

</form>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePass(id){
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
