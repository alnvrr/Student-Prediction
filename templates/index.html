<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

<h1 class="text-center">📊 Student Analytics Dashboard</h1>

<div class="row mt-4">

<!-- LEFT PANEL -->
<div class="col-md-4">

<div class="card p-3 mb-3">
<h4>Prediction</h4>

<input id="att" class="form-control mb-2" placeholder="Attendance">
<input id="hrs" class="form-control mb-2" placeholder="Study Hours">
<input id="sgpa" class="form-control mb-2" placeholder="Prev SGPA">

<button class="btn btn-primary w-100" onclick="predict()">Predict</button>

<h3 id="result"></h3>
</div>

<div class="card p-3 mb-3">
<h4>Filter</h4>

<input id="min_att" class="form-control mb-2" placeholder="Min Attendance">
<input id="max_att" class="form-control mb-2" placeholder="Max Attendance">

<button class="btn btn-warning w-100" onclick="applyFilter()">Apply Filter</button>
</div>

<div class="card p-3">
<button class="btn btn-danger w-100" onclick="retrain()">🔁 Retrain Model</button>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="col-md-8">

<div class="card p-3 mb-3">
<h4>CGPA Chart</h4>
<canvas id="cgpaChart"></canvas>
</div>

<div class="card p-3">
<h4>🔥 Correlation Heatmap</h4>
<div id="heatmap"></div>
</div>

</div>

</div>
</div>

<script>
let chart;

// LOAD DATA
fetch('/data')
.then(res => res.json())
.then(data => {

    chart = new Chart(document.getElementById('cgpaChart'), {
        type: 'bar',
        data: {
            labels: data.cgpa.map((_, i) => i+1),
            datasets: [{ label: "CGPA", data: data.cgpa }]
        }
    });

    // Plotly heatmap
    const labels = Object.keys(data.corr);
    const z = labels.map(r => labels.map(c => data.corr[r][c]));

    Plotly.newPlot('heatmap', [{
        z: z,
        x: labels,
        y: labels,
        type: 'heatmap',
        colorscale: 'RdBu'
    }]);
});

// PREDICT
function predict(){

    const attendance = document.getElementById('att').value;
    const study_hours = document.getElementById('hrs').value;
    const prev_sgpa = document.getElementById('sgpa').value;

    fetch('/predict', {
        method: 'POST',

        // ✅ THIS HEADER IS THE KEY FIX
        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({
            attendance: attendance,
            study_hours: study_hours,
            prev_sgpa: prev_sgpa
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('result').innerText =
            "Predicted CGPA: " + data.prediction;
    })
    .catch(err => console.error(err));
}

// FILTER
function applyFilter(){
    fetch('/filter',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            min_att: document.getElementById('min_att').value,
            max_att: document.getElementById('max_att').value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        chart.data.datasets[0].data = data.cgpa;
        chart.update();
    });
}

// RETRAIN
function retrain(){
    fetch('/retrain',{method:'POST'})
    .then(res=>res.json())
    .then(data=>{
        alert(data.status);
    });
}
</script>

</body>
</html>
