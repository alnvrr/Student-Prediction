<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#f4f6f9;}
.dark{background:#12121c;color:white;}
.card{padding:15px;border-radius:15px;}
.dark .card{background:#1e1e2f;color:white;}
</style>
</head>

<body id="body">

<div class="container mt-4">

<div class="d-flex justify-content-between">
<h3>🚀 Student AI Dashboard</h3>
<div>
<button onclick="toggleDark()" class="btn btn-dark">🌙</button>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>
</div>

<div class="row mt-3">

<div class="col-md-4">
<div class="card">

<input id="att" class="form-control mb-2" placeholder="Attendance">
<input id="hrs" class="form-control mb-2" placeholder="Study Hours">
<input id="sgpa" class="form-control mb-2" placeholder="SGPA">

<button onclick="run()" class="btn btn-primary w-100">Predict</button>

<h3 id="res" class="mt-3">--</h3>
<div id="chat"></div>

<p id="conf"></p>
<p id="acc"></p>

<button onclick="pdf()" class="btn btn-success w-100">Download Report</button>

</div>
</div>

<div class="col-md-8">
<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

</div>

</div>

<script>
const socket=io();
let chart;

function toggleDark(){
document.getElementById('body').classList.toggle("dark");
}

function run(){
let a=att.value,h=hrs.value,s=sgpa.value;

socket.emit('predict',{attendance:a,study_hours:h,prev_sgpa:s});

fetch('/student_trend',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({attendance:a,study_hours:h,prev_sgpa:s})
})
.then(r=>r.json())
.then(d=>{
if(chart) chart.destroy();

chart=new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:d.x,
datasets:[{
label:'Future CGPA',
data:d.future_pred,
borderColor:'#7c3aed',
backgroundColor:'rgba(124,58,237,0.2)',
fill:true,
tension:0.4
}]
}
});
});
}

socket.on('prediction_result',d=>{
res.innerText="CGPA: "+d.prediction;
chat.innerText=d.report;
conf.innerText="Confidence: "+d.confidence+"%";
acc.innerText="Model Accuracy: "+d.accuracy+"%";
});

function pdf(){
fetch('/export',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
    prediction: res.innerText.split(": ")[1],
    attendance: att.value,
    study_hours: hrs.value,
    prev_sgpa: sgpa.value
})
})
.then(r=>r.blob())
.then(b=>window.open(URL.createObjectURL(b)));
}
</script>

</body>
</html>
